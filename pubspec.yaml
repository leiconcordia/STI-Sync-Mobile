name: sti_sync
description: "STI Sync Student Mobile App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  firebase_storage: ^12.4.2
  # State & Navigation
  flutter_riverpod: ^2.6.1
  go_router: ^14.7.2
  # QR
  mobile_scanner: ^6.0.4
  # Utils
  connectivity_plus: ^6.0.0
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  http: ^1.2.2
  image_picker: ^1.1.2
  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  glassmorphism: ^3.0.0
  # Local DB
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

dev_dependencies:
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
